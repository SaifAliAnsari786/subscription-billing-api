services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:latest
    container_name: billing_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: billing_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: billing
      MYSQL_USER: billing
      MYSQL_PASSWORD: billing
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    container_name: billing_redis
    ports:
      - "6379:6379"